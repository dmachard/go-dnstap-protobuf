name: Testing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  testing:
    runs-on: ubuntu-24.04
    
    strategy:
      matrix:
        go-version: [ '1.25', '1.26' ]
        
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: false

    - name: edit go version
      run: |
        go mod edit -go=${{ matrix.go-version }}
        go mod tidy
        go version

    - name: Test
      run: go test -cover -v

    - name: Bench
      run: go test -bench .

    - name: Bench with race detection
      run: go test -race -bench .
